# MailFS 统一配置文件
# ──────────────────────────────────────────────────────────────────

# IMAP 服务器地址（含端口）
imap_server: "imap.qq.com:993"

# 凭据文件路径（第一行用户名，第二行密码）
credential_file: "passwd.txt"

# 邮件显示名（邮件 From/To 中的名称）
email_name: "阳光"

# 邮箱目录前缀（IMAP LIST 命令使用）
mailbox_prefix: "其他文件夹/*"

# 下载文件存储根目录
download_dir: "D:/"

# HTTP 流媒体服务监听地址（本机启动的 HTTP 服务端口）
http_listen_addr: ":9888"

# 复制 HTTP 播放链接时使用的地址（供外部客户端访问）
http_copy_addr: "http://127.0.0.1:9888"

# 允许显示的邮箱远程目录列表
# 只有列出的目录才会在界面中显示；如果为空则不显示任何目录
allowed_folders:
  - "其他文件夹/avitpc"

# 目录上传时忽略的文件后缀（不区分大小写）
# 匹配到这些后缀的文件在上传目录时会被自动跳过
ignore_extensions:
  - ".ds_store"
  - ".thumbs.db"
  - ".tmp"
  - ".bak"
  - ".log"

# 日志输出目标: "console" 输出到控制台, "file" 输出到日志文件
log_output: "console"

# 默认块大小（字节），不匹配任何后缀规则时使用，默认 32MB
default_block_size: 33554432

# 按文件后缀配置块大小（字节），后缀不区分大小写
# 例如视频文件可以用更大的块以减少邮件数量
block_sizes:
  ".mp4": 5242880    # 5MB
